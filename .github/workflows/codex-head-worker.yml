name: Codex Head Worker
run-name: codex-head task ${{ inputs.task_id }}

on:
  workflow_dispatch:
    inputs:
      task_id:
        description: "Task id tracked by codex-head"
        required: true
        type: string
      payload_path:
        description: "Path to the GitHub dispatch payload generated by codex-head"
        required: false
        type: string
      payload_json:
        description: "Inline JSON payload generated by codex-head"
        required: false
        type: string

jobs:
  worker:
    runs-on: ${{ fromJSON(vars.CODEX_HEAD_RUNS_ON_JSON != '' && vars.CODEX_HEAD_RUNS_ON_JSON || '["ubuntu-latest"]') }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    defaults:
      run:
        working-directory: codex-head
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install codex-head dependencies
        run: npm ci

      - name: Build codex-head
        run: npm run build

      - name: Materialize dispatch payload
        id: payload
        shell: pwsh
        env:
          PAYLOAD_JSON: ${{ inputs.payload_json }}
          PAYLOAD_PATH: ${{ inputs.payload_path }}
        run: |
          New-Item -ItemType Directory -Force -Path runtime | Out-Null
          if ($env:PAYLOAD_JSON) {
            $env:PAYLOAD_JSON | Set-Content -Path runtime/worker-dispatch.json -NoNewline -Encoding utf8NoBOM
          } elseif ($env:PAYLOAD_PATH -and (Test-Path $env:PAYLOAD_PATH)) {
            Copy-Item $env:PAYLOAD_PATH runtime/worker-dispatch.json -Force
          } else {
            Write-Error "Dispatch payload is not available in the runner checkout and no inline payload was provided."
            exit 1
          }
          Get-Content runtime/worker-dispatch.json
          "payload_path=runtime/worker-dispatch.json" | Add-Content -Path $env:GITHUB_OUTPUT

      - name: Execute worker payload
        run: node dist/src/index.js run-github-payload "${{ steps.payload.outputs.payload_path }}"

      - name: Upload callback artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: codex-head-worker-callback-${{ inputs.task_id }}
          path: codex-head/runtime/artifacts/${{ inputs.task_id }}/github-callback.json
