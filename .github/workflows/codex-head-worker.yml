name: Codex Head Worker
run-name: codex-head task ${{ inputs.task_id }}

on:
  workflow_dispatch:
    inputs:
      task_id:
        description: "Task id tracked by codex-head"
        required: true
        type: string
      payload_path:
        description: "Path to the GitHub dispatch payload generated by codex-head"
        required: false
        type: string
      payload_json:
        description: "Inline JSON payload generated by codex-head"
        required: false
        type: string

jobs:
  worker:
    runs-on: ${{ fromJSON(vars.CODEX_HEAD_RUNS_ON_JSON != '' && vars.CODEX_HEAD_RUNS_ON_JSON || '["ubuntu-latest"]') }}
    defaults:
      run:
        working-directory: codex-head
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install codex-head dependencies
        run: npm ci

      - name: Build codex-head
        run: npm run build

      - name: Materialize dispatch payload
        id: payload
        shell: bash
        run: |
          mkdir -p runtime
          if [[ -n "${{ inputs.payload_json }}" ]]; then
            printf '%s' '${{ inputs.payload_json }}' > runtime/worker-dispatch.json
          elif [[ -n "${{ inputs.payload_path }}" && -f "${{ inputs.payload_path }}" ]]; then
            cp "${{ inputs.payload_path }}" runtime/worker-dispatch.json
          else
            echo "::error::Dispatch payload is not available in the runner checkout and no inline payload was provided."
            exit 1
          fi
          cat runtime/worker-dispatch.json
          echo "payload_path=runtime/worker-dispatch.json" >> "$GITHUB_OUTPUT"

      - name: Execute worker payload
        run: node dist/src/index.js run-github-payload "${{ steps.payload.outputs.payload_path }}"

      - name: Upload callback artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codex-head-worker-callback-${{ inputs.task_id }}
          path: codex-head/runtime/artifacts/${{ inputs.task_id }}/github-callback.json
