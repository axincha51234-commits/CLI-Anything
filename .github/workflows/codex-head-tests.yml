name: codex-head-tests

on:
  pull_request:
    paths:
      - "codex-head/**"
      - ".github/workflows/codex-head-tests.yml"
      - ".github/workflows/codex-head-worker.yml"
      - ".github/workflows/codex-head-gemini-review.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: codex-head
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: codex-head/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run codex-head tests
        run: npm test
