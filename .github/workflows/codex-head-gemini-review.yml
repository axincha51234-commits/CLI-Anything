name: codex-head-gemini-review
run-name: codex-head task ${{ inputs.task_id }}

on:
  workflow_dispatch:
    inputs:
      task_id:
        description: "codex-head task id"
        required: true
        type: string
      target_repository:
        description: "target GitHub repository"
        required: true
        type: string
      base_branch:
        description: "base branch for diff review"
        required: true
        type: string
      work_branch:
        description: "work branch for review context"
        required: true
        type: string
      execution_target:
        description: "primary worker target"
        required: true
        type: string
      review_policy:
        description: "review policy"
        required: true
        type: string
      expected_output:
        description: "expected output summary"
        required: true
        type: string
      prior_result_status:
        description: "status returned by the primary worker"
        required: true
        type: string

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    defaults:
      run:
        working-directory: codex-head
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.target_repository }}
          ref: ${{ github.event.inputs.base_branch }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: codex-head/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build codex-head
        run: npm run build

      - name: Build review diff
        id: build_review_diff
        shell: bash
        run: |
          mkdir -p runtime
          git fetch origin "${{ github.event.inputs.base_branch }}" --depth=1
          git fetch origin "${{ github.event.inputs.work_branch }}" --depth=1 || true

          if git rev-parse --verify "origin/${{ github.event.inputs.work_branch }}" >/dev/null 2>&1; then
            git diff "origin/${{ github.event.inputs.base_branch }}...origin/${{ github.event.inputs.work_branch }}" > runtime/review.diff
            echo "work_branch_available=true" >> "$GITHUB_OUTPUT"
          else
            {
              echo "Work branch '${{ github.event.inputs.work_branch }}' was not available on origin."
              echo "Falling back to base branch context only."
            } > runtime/review.diff
            echo "work_branch_available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect remote review auth
        id: review_auth
        shell: bash
        env:
          REVIEW_API_URL: ${{ secrets.REVIEW_API_URL }}
          REVIEW_API_KEY: ${{ secrets.REVIEW_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [[ -n "${REVIEW_API_URL}" && -n "${REVIEW_API_KEY}" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "provider=openai-compatible" >> "$GITHUB_OUTPUT"
            echo "credential_source=review_api" >> "$GITHUB_OUTPUT"
          elif [[ -n "${OPENAI_API_KEY}" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "provider=openai-compatible" >> "$GITHUB_OUTPUT"
            echo "credential_source=openai" >> "$GITHUB_OUTPUT"
          elif [[ -n "${GEMINI_API_KEY}" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "provider=gemini" >> "$GITHUB_OUTPUT"
            echo "credential_source=gemini" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "provider=none" >> "$GITHUB_OUTPUT"
            echo "credential_source=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Run OpenAI-compatible review
        id: openai_review
        if: ${{ steps.review_auth.outputs.provider == 'openai-compatible' }}
        continue-on-error: true
        shell: bash
        env:
          REVIEW_API_URL: ${{ secrets.REVIEW_API_URL }}
          REVIEW_API_KEY: ${{ secrets.REVIEW_API_KEY }}
          REVIEW_MODEL: ${{ secrets.REVIEW_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_REVIEW_MODEL: ${{ secrets.OPENAI_REVIEW_MODEL }}
          TARGET_REPOSITORY: ${{ github.event.inputs.target_repository }}
          BASE_BRANCH: ${{ github.event.inputs.base_branch }}
          WORK_BRANCH: ${{ github.event.inputs.work_branch }}
          EXECUTION_TARGET: ${{ github.event.inputs.execution_target }}
          PRIOR_RESULT_STATUS: ${{ github.event.inputs.prior_result_status }}
          REVIEW_POLICY: ${{ github.event.inputs.review_policy }}
          EXPECTED_OUTPUT: ${{ github.event.inputs.expected_output }}
        run: |
          node - <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");

          const baseUrl = (process.env.REVIEW_API_URL || process.env.OPENAI_BASE_URL || "https://api.openai.com/v1").replace(/\/$/, "");
          const apiKey = process.env.REVIEW_API_KEY || process.env.OPENAI_API_KEY;
          const model = process.env.REVIEW_MODEL || process.env.OPENAI_REVIEW_MODEL || "gpt-4.1-mini";
          const diffPath = path.join("runtime", "review.diff");
          const outputPath = path.join("runtime", "review-model-output.txt");
          const diff = fs.existsSync(diffPath) ? fs.readFileSync(diffPath, "utf8") : "";

          const system = "You are the remote review worker under Codex Head. Return JSON only with keys review_verdict, summary, and review_notes. Do not use code fences or extra text.";
          const user = [
            `Review the git diff in codex-head/runtime/review.diff for repository ${process.env.TARGET_REPOSITORY}.`,
            `Base branch: ${process.env.BASE_BRANCH}`,
            `Work branch: ${process.env.WORK_BRANCH}`,
            `Primary execution target: ${process.env.EXECUTION_TARGET}`,
            `Prior worker status: ${process.env.PRIOR_RESULT_STATUS}`,
            `Review policy: ${process.env.REVIEW_POLICY}`,
            `Expected output: ${process.env.EXPECTED_OUTPUT}`,
            "",
            "Return JSON only, with no code fences and no extra text:",
            "{",
            '  "review_verdict": "approved|changes_requested|commented",',
            '  "summary": "short summary",',
            '  "review_notes": ["note 1", "note 2"]',
            "}",
            "",
            "Do not modify files, do not create commits, and do not post GitHub comments.",
            "",
            diff
          ].join("\n");

          async function main() {
            const response = await fetch(`${baseUrl}/chat/completions`, {
              method: "POST",
              headers: {
                "Authorization": `Bearer ${apiKey}`,
                "Content-Type": "application/json"
              },
              body: JSON.stringify({
                model,
                temperature: 0.1,
                messages: [
                  { role: "system", content: system },
                  { role: "user", content: user }
                ]
              })
            });

            const bodyText = await response.text();
            if (!response.ok) {
              throw new Error(`OpenAI-compatible review request failed (${response.status}): ${bodyText.slice(0, 2000)}`);
            }

            const parsed = JSON.parse(bodyText);
            const content = parsed?.choices?.[0]?.message?.content;
            const normalizedContent = Array.isArray(content)
              ? content
                  .map((item) => typeof item?.text === "string" ? item.text : "")
                  .join("\n")
                  .trim()
              : String(content ?? "").trim();

            if (!normalizedContent) {
              throw new Error("OpenAI-compatible review response did not contain message content.");
            }

            fs.writeFileSync(outputPath, normalizedContent, "utf8");
          }

          main().catch((error) => {
            process.stderr.write(`${error instanceof Error ? error.message : String(error)}\n`);
            process.exitCode = 1;
          });
          NODE

      - name: Run Gemini review
        id: gemini_review
        if: ${{ steps.review_auth.outputs.provider == 'gemini' }}
        continue-on-error: true
        uses: google-github-actions/run-gemini-cli@v0.1.21
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            You are the Gemini review worker under Codex Head.
            Review the git diff in codex-head/runtime/review.diff for repository ${{ github.event.inputs.target_repository }}.
            Base branch: ${{ github.event.inputs.base_branch }}
            Work branch: ${{ github.event.inputs.work_branch }}
            Primary execution target: ${{ github.event.inputs.execution_target }}
            Prior worker status: ${{ github.event.inputs.prior_result_status }}
            Review policy: ${{ github.event.inputs.review_policy }}
            Expected output: ${{ github.event.inputs.expected_output }}

            Return JSON only, with no code fences and no extra text:
            {
              "review_verdict": "approved|changes_requested|commented",
              "summary": "short summary",
              "review_notes": ["note 1", "note 2"]
            }

            Do not modify files, do not create commits, and do not post GitHub comments.
          upload_artifacts: false

      - name: Persist Gemini review output
        if: ${{ steps.review_auth.outputs.provider == 'gemini' && steps.gemini_review.outcome == 'success' }}
        shell: bash
        run: |
          printf '%s' '${{ steps.gemini_review.outputs.summary }}' > runtime/review-model-output.txt

      - name: Write callback artifact
        shell: bash
        env:
          TASK_ID: ${{ github.event.inputs.task_id }}
          TARGET_REPOSITORY: ${{ github.event.inputs.target_repository }}
          BASE_BRANCH: ${{ github.event.inputs.base_branch }}
          WORK_BRANCH: ${{ github.event.inputs.work_branch }}
          EXECUTION_TARGET: ${{ github.event.inputs.execution_target }}
          PRIOR_RESULT_STATUS: ${{ github.event.inputs.prior_result_status }}
          EXPECTED_OUTPUT: ${{ github.event.inputs.expected_output }}
          WORK_BRANCH_AVAILABLE: ${{ steps.build_review_diff.outputs.work_branch_available }}
          REVIEW_PROVIDER: ${{ steps.review_auth.outputs.provider }}
          REVIEW_CREDENTIAL_SOURCE: ${{ steps.review_auth.outputs.credential_source }}
          REVIEW_CONFIGURED: ${{ steps.review_auth.outputs.configured }}
          OPENAI_REVIEW_OUTCOME: ${{ steps.openai_review.outcome }}
          GEMINI_REVIEW_OUTCOME: ${{ steps.gemini_review.outcome }}
        run: |
          mkdir -p runtime/artifacts/${TASK_ID}
          node - <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");
          const reviewCallbackModule = path.resolve("dist", "src", "github", "reviewCallback.js");
          const {
            buildFallbackGeminiReview,
            buildGitHubReviewCallback,
            normalizeGeminiReviewSummary
          } = require(reviewCallbackModule);

          const taskId = process.env.TASK_ID;
          const callbackPath = path.join("runtime", "artifacts", taskId, "github-callback.json");
          const configured = process.env.REVIEW_CONFIGURED === "true";
          const provider = process.env.REVIEW_PROVIDER || "none";
          const providerOutcome = provider === "openai-compatible"
            ? (process.env.OPENAI_REVIEW_OUTCOME || "")
            : (process.env.GEMINI_REVIEW_OUTCOME || "");
          const rawSummaryPath = path.join("runtime", "review-model-output.txt");
          const rawSummary = fs.existsSync(rawSummaryPath)
            ? fs.readFileSync(rawSummaryPath, "utf8")
            : "";

          let review;
          if (!configured) {
            review = buildFallbackGeminiReview("Remote review skipped because no supported workflow credential was configured.");
          } else if (providerOutcome !== "success") {
            review = buildFallbackGeminiReview(`Remote review failed or was skipped with provider ${provider} and outcome: ${providerOutcome || "unknown"}.`);
          } else {
            review = normalizeGeminiReviewSummary(
              rawSummary,
              `Remote review returned invalid structured output for provider ${provider}.`
            );
          }

          const callback = buildGitHubReviewCallback(taskId, callbackPath, review, [
            "Review callback captured from GitHub workflow.",
            `Review provider was ${provider}.`,
            `Credential source was ${process.env.REVIEW_CREDENTIAL_SOURCE}.`,
            `Target repository was ${process.env.TARGET_REPOSITORY}.`,
            `Base branch was ${process.env.BASE_BRANCH}.`,
            `Work branch was ${process.env.WORK_BRANCH}.`,
            `Work branch was available on origin: ${process.env.WORK_BRANCH_AVAILABLE}.`,
            `Primary execution target was ${process.env.EXECUTION_TARGET}.`,
            `Prior worker status was ${process.env.PRIOR_RESULT_STATUS}.`,
            `Expected output was ${process.env.EXPECTED_OUTPUT}.`
          ]);
          fs.writeFileSync(callbackPath, JSON.stringify(callback, null, 2), "utf8");
          NODE

      - name: Upload callback artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codex-head-github-callback-${{ github.event.inputs.task_id }}
          path: codex-head/runtime/artifacts/${{ github.event.inputs.task_id }}/github-callback.json
