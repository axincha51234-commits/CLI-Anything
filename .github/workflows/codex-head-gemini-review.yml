name: codex-head-gemini-review
run-name: codex-head task ${{ inputs.task_id }}

on:
  workflow_dispatch:
    inputs:
      task_id:
        description: "codex-head task id"
        required: true
        type: string
      target_repository:
        description: "target GitHub repository"
        required: true
        type: string
      base_branch:
        description: "base branch for diff review"
        required: true
        type: string
      work_branch:
        description: "work branch for review context"
        required: true
        type: string
      execution_target:
        description: "primary worker target"
        required: true
        type: string
      review_policy:
        description: "review policy"
        required: true
        type: string
      expected_output:
        description: "expected output summary"
        required: true
        type: string
      prior_result_status:
        description: "status returned by the primary worker"
        required: true
        type: string

jobs:
  review:
    runs-on: ${{ fromJSON(vars.CODEX_HEAD_RUNS_ON_JSON != '' && vars.CODEX_HEAD_RUNS_ON_JSON || '["ubuntu-latest"]') }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      contents: read
      pull-requests: read
    defaults:
      run:
        working-directory: codex-head/codex-head
    steps:
      - name: Checkout codex-head control repo
        uses: actions/checkout@v5
        with:
          path: codex-head

      - name: Checkout target repository
        uses: actions/checkout@v5
        with:
          repository: ${{ github.event.inputs.target_repository }}
          ref: ${{ github.event.inputs.base_branch }}
          fetch-depth: 0
          path: target-repo

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build codex-head
        run: npm run build

      - name: Build review diff
        id: build_review_diff
        shell: pwsh
        working-directory: target-repo
        run: |
          New-Item -ItemType Directory -Force -Path ../codex-head/codex-head/runtime | Out-Null
          & git fetch origin "${{ github.event.inputs.base_branch }}" --depth=1
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to fetch base branch ${{ github.event.inputs.base_branch }} from origin."
          }

          & git fetch origin "${{ github.event.inputs.work_branch }}" --depth=1 *> $null
          $workBranchRef = "origin/${{ github.event.inputs.work_branch }}"
          $workBranchAvailable = $LASTEXITCODE -eq 0
          if ($workBranchAvailable) {
            & git rev-parse --verify $workBranchRef *> $null
            $workBranchAvailable = $LASTEXITCODE -eq 0
          }

          if ($workBranchAvailable) {
            & git diff "origin/${{ github.event.inputs.base_branch }}...$workBranchRef" | Set-Content -Path ../codex-head/codex-head/runtime/review.diff -Encoding utf8NoBOM
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to build review diff from $workBranchRef."
            }
            "work_branch_available=true" | Add-Content -Path $env:GITHUB_OUTPUT
          } else {
            @(
              "Work branch '${{ github.event.inputs.work_branch }}' was not available on origin."
              "Falling back to base branch context only."
            ) | Set-Content -Path ../codex-head/codex-head/runtime/review.diff -Encoding utf8NoBOM
            "work_branch_available=false" | Add-Content -Path $env:GITHUB_OUTPUT
            $global:LASTEXITCODE = 0
          }

      - name: Detect remote review auth
        id: review_auth
        shell: pwsh
        env:
          REVIEW_API_URL: ${{ secrets.REVIEW_API_URL }}
          REVIEW_API_KEY: ${{ secrets.REVIEW_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if ($env:REVIEW_API_URL -and $env:REVIEW_API_KEY) {
            @(
              "configured=true"
              "provider=openai-compatible"
              "credential_source=review_api"
            ) | Add-Content -Path $env:GITHUB_OUTPUT
          } elseif ($env:OPENAI_API_KEY) {
            @(
              "configured=true"
              "provider=openai-compatible"
              "credential_source=openai"
            ) | Add-Content -Path $env:GITHUB_OUTPUT
          } elseif ($env:GEMINI_API_KEY) {
            @(
              "configured=true"
              "provider=gemini"
              "credential_source=gemini"
            ) | Add-Content -Path $env:GITHUB_OUTPUT
          } else {
            @(
              "configured=false"
              "provider=none"
              "credential_source=none"
            ) | Add-Content -Path $env:GITHUB_OUTPUT
          }

      - name: Run OpenAI-compatible review
        id: openai_review
        if: ${{ steps.review_auth.outputs.provider == 'openai-compatible' && steps.build_review_diff.outputs.work_branch_available == 'true' }}
        continue-on-error: true
        shell: pwsh
        env:
          REVIEW_API_URL: ${{ secrets.REVIEW_API_URL }}
          REVIEW_API_KEY: ${{ secrets.REVIEW_API_KEY }}
          REVIEW_MODEL: ${{ secrets.REVIEW_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_REVIEW_MODEL: ${{ secrets.OPENAI_REVIEW_MODEL }}
          TARGET_REPOSITORY: ${{ github.event.inputs.target_repository }}
          BASE_BRANCH: ${{ github.event.inputs.base_branch }}
          WORK_BRANCH: ${{ github.event.inputs.work_branch }}
          EXECUTION_TARGET: ${{ github.event.inputs.execution_target }}
          PRIOR_RESULT_STATUS: ${{ github.event.inputs.prior_result_status }}
          REVIEW_POLICY: ${{ github.event.inputs.review_policy }}
          EXPECTED_OUTPUT: ${{ github.event.inputs.expected_output }}
        run: |
          @'
          const fs = require("node:fs");
          const path = require("node:path");

          const baseUrl = String(process.env.REVIEW_API_URL || process.env.OPENAI_BASE_URL || "https://api.openai.com/v1").trim().replace(/\/$/, "");
          const apiKey = String(process.env.REVIEW_API_KEY || process.env.OPENAI_API_KEY || "").trim();
          const model = String(process.env.REVIEW_MODEL || process.env.OPENAI_REVIEW_MODEL || "gpt-4.1-mini").trim();
          const diffPath = path.join("runtime", "review.diff");
          const outputPath = path.join("runtime", "review-model-output.txt");
          const diff = fs.existsSync(diffPath) ? fs.readFileSync(diffPath, "utf8") : "";

          const system = "You are the remote review worker under Codex Head. Return JSON only with keys review_verdict, summary, and review_notes. Do not use code fences or extra text.";
          const user = [
            `Review the git diff in codex-head/runtime/review.diff for repository ${process.env.TARGET_REPOSITORY}.`,
            `Base branch: ${process.env.BASE_BRANCH}`,
            `Work branch: ${process.env.WORK_BRANCH}`,
            `Primary execution target: ${process.env.EXECUTION_TARGET}`,
            `Prior worker status: ${process.env.PRIOR_RESULT_STATUS}`,
            `Review policy: ${process.env.REVIEW_POLICY}`,
            `Expected output: ${process.env.EXPECTED_OUTPUT}`,
            "",
            "Return JSON only, with no code fences and no extra text:",
            "{",
            '  "review_verdict": "approved|changes_requested|commented",',
            '  "summary": "short summary",',
            '  "review_notes": ["note 1", "note 2"]',
            "}",
            "",
            "Do not modify files, do not create commits, and do not post GitHub comments.",
            "",
            diff
          ].join("\n");

          function extractResponsesText(parsed) {
            if (typeof parsed?.output_text === "string" && parsed.output_text.trim()) {
              return parsed.output_text.trim();
            }
            const items = Array.isArray(parsed?.output) ? parsed.output : [];
            const text = items
              .flatMap((item) => Array.isArray(item?.content) ? item.content : [])
              .filter((item) => item?.type === "output_text" && typeof item?.text === "string")
              .map((item) => item.text.trim())
              .filter(Boolean)
              .join("\n")
              .trim();
            return text;
          }

          function extractChatText(parsed) {
            const content = parsed?.choices?.[0]?.message?.content;
            if (Array.isArray(content)) {
              return content
                .map((item) => typeof item?.text === "string" ? item.text : "")
                .join("\n")
                .trim();
            }
            return String(content ?? "").trim();
          }

          async function main() {
            const attempts = [
              {
                name: "responses",
                url: `${baseUrl}/responses`,
                body: {
                  model,
                  temperature: 0.1,
                  input: [
                    {
                      role: "system",
                      content: [{ type: "input_text", text: system }]
                    },
                    {
                      role: "user",
                      content: [{ type: "input_text", text: user }]
                    }
                  ],
                  text: {
                    format: {
                      type: "text"
                    }
                  }
                },
                extract: extractResponsesText
              },
              {
                name: "chat_completions",
                url: `${baseUrl}/chat/completions`,
                body: {
                  model,
                  temperature: 0.1,
                  messages: [
                    { role: "system", content: system },
                    { role: "user", content: user }
                  ]
                },
                extract: extractChatText
              }
            ];

            const errors = [];
            for (const attempt of attempts) {
              const response = await fetch(attempt.url, {
                method: "POST",
                headers: {
                  "Authorization": `Bearer ${apiKey}`,
                  "Content-Type": "application/json"
                },
                body: JSON.stringify(attempt.body)
              });

              const bodyText = await response.text();
              if (!response.ok) {
                errors.push(`${attempt.name} (${response.status}): ${bodyText.slice(0, 800)}`);
                continue;
              }

              let parsed;
              try {
                parsed = JSON.parse(bodyText);
              } catch (error) {
                const message = error instanceof Error ? error.message : String(error);
                errors.push(`${attempt.name} (invalid-json): ${message}`);
                continue;
              }

              const normalizedContent = attempt.extract(parsed);
              if (!normalizedContent) {
                errors.push(`${attempt.name} (empty-content): response did not contain model text`);
                continue;
              }

              fs.writeFileSync(path.join("runtime", "review-provider.json"), JSON.stringify({
                provider: "openai-compatible",
                protocol: attempt.name,
                model
              }, null, 2), "utf8");
              fs.writeFileSync(outputPath, normalizedContent, "utf8");
              return;
            }

            throw new Error(`OpenAI-compatible review request failed. ${errors.join(" | ").slice(0, 4000)}`);
          }

          main().catch((error) => {
            process.stderr.write(`${error instanceof Error ? error.message : String(error)}\n`);
            process.exitCode = 1;
          });
          '@ | node

      - name: Run Gemini review
        id: gemini_review
        if: ${{ steps.review_auth.outputs.provider == 'gemini' && steps.build_review_diff.outputs.work_branch_available == 'true' }}
        continue-on-error: true
        uses: google-github-actions/run-gemini-cli@v0.1.21
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            You are the Gemini review worker under Codex Head.
            Review the git diff in codex-head/runtime/review.diff for repository ${{ github.event.inputs.target_repository }}.
            Base branch: ${{ github.event.inputs.base_branch }}
            Work branch: ${{ github.event.inputs.work_branch }}
            Primary execution target: ${{ github.event.inputs.execution_target }}
            Prior worker status: ${{ github.event.inputs.prior_result_status }}
            Review policy: ${{ github.event.inputs.review_policy }}
            Expected output: ${{ github.event.inputs.expected_output }}

            Return JSON only, with no code fences and no extra text:
            {
              "review_verdict": "approved|changes_requested|commented",
              "summary": "short summary",
              "review_notes": ["note 1", "note 2"]
            }

            Do not modify files, do not create commits, and do not post GitHub comments.
          upload_artifacts: false

      - name: Persist Gemini review output
        if: ${{ steps.review_auth.outputs.provider == 'gemini' && steps.gemini_review.outcome == 'success' }}
        shell: pwsh
        run: |
          @'
          ${{ steps.gemini_review.outputs.summary }}
          '@ | Set-Content -Path runtime/review-model-output.txt -NoNewline -Encoding utf8NoBOM

      - name: Write callback artifact
        shell: pwsh
        env:
          TASK_ID: ${{ github.event.inputs.task_id }}
          TARGET_REPOSITORY: ${{ github.event.inputs.target_repository }}
          BASE_BRANCH: ${{ github.event.inputs.base_branch }}
          WORK_BRANCH: ${{ github.event.inputs.work_branch }}
          EXECUTION_TARGET: ${{ github.event.inputs.execution_target }}
          PRIOR_RESULT_STATUS: ${{ github.event.inputs.prior_result_status }}
          EXPECTED_OUTPUT: ${{ github.event.inputs.expected_output }}
          WORK_BRANCH_AVAILABLE: ${{ steps.build_review_diff.outputs.work_branch_available }}
          REVIEW_PROVIDER: ${{ steps.review_auth.outputs.provider }}
          REVIEW_CREDENTIAL_SOURCE: ${{ steps.review_auth.outputs.credential_source }}
          REVIEW_CONFIGURED: ${{ steps.review_auth.outputs.configured }}
          OPENAI_REVIEW_OUTCOME: ${{ steps.openai_review.outcome }}
          GEMINI_REVIEW_OUTCOME: ${{ steps.gemini_review.outcome }}
        run: |
          New-Item -ItemType Directory -Force -Path "runtime/artifacts/$env:TASK_ID" | Out-Null
          @'
          const fs = require("node:fs");
          const path = require("node:path");
          const reviewCallbackModule = path.resolve("dist", "src", "github", "reviewCallback.js");
          const {
            buildFallbackGeminiReview,
            buildGitHubReviewCallback,
            normalizeGeminiReviewSummary
          } = require(reviewCallbackModule);

          const taskId = process.env.TASK_ID;
          const callbackPath = path.join("runtime", "artifacts", taskId, "github-callback.json");
          const configured = process.env.REVIEW_CONFIGURED === "true";
          const provider = process.env.REVIEW_PROVIDER || "none";
          const providerOutcome = provider === "openai-compatible"
            ? (process.env.OPENAI_REVIEW_OUTCOME || "")
            : (process.env.GEMINI_REVIEW_OUTCOME || "");
          const providerMetaPath = path.join("runtime", "review-provider.json");
          const providerMeta = fs.existsSync(providerMetaPath)
            ? JSON.parse(fs.readFileSync(providerMetaPath, "utf8"))
            : null;
          const rawSummaryPath = path.join("runtime", "review-model-output.txt");
          const rawSummary = fs.existsSync(rawSummaryPath)
            ? fs.readFileSync(rawSummaryPath, "utf8")
            : "";

          let review;
          if (process.env.WORK_BRANCH_AVAILABLE !== "true") {
            review = buildFallbackGeminiReview(`Remote review skipped because work branch '${process.env.WORK_BRANCH}' was not available on origin.`);
          } else if (!configured) {
            review = buildFallbackGeminiReview("Remote review skipped because no supported workflow credential was configured.");
          } else if (providerOutcome !== "success") {
            review = buildFallbackGeminiReview(`Remote review failed or was skipped with provider ${provider} and outcome: ${providerOutcome || "unknown"}.`);
          } else {
            review = normalizeGeminiReviewSummary(
              rawSummary,
              `Remote review returned invalid structured output for provider ${provider}.`
            );
          }

          const callback = buildGitHubReviewCallback(taskId, callbackPath, review, [
            "Review callback captured from GitHub workflow.",
            `Review provider was ${provider}.`,
            `Credential source was ${process.env.REVIEW_CREDENTIAL_SOURCE}.`,
            `Review transport was ${providerMeta?.protocol || "unknown"}.`,
            `Review model was ${providerMeta?.model || "unknown"}.`,
            `Target repository was ${process.env.TARGET_REPOSITORY}.`,
            `Base branch was ${process.env.BASE_BRANCH}.`,
            `Work branch was ${process.env.WORK_BRANCH}.`,
            `Work branch was available on origin: ${process.env.WORK_BRANCH_AVAILABLE}.`,
            `Primary execution target was ${process.env.EXECUTION_TARGET}.`,
            `Prior worker status was ${process.env.PRIOR_RESULT_STATUS}.`,
            `Expected output was ${process.env.EXPECTED_OUTPUT}.`
          ]);
          fs.writeFileSync(callbackPath, JSON.stringify(callback, null, 2), "utf8");
          '@ | node

      - name: Upload callback artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: codex-head-github-callback-${{ github.event.inputs.task_id }}
          path: codex-head/codex-head/runtime/artifacts/${{ github.event.inputs.task_id }}/github-callback.json
